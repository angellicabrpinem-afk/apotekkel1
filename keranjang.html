<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Keranjang Belanja - GoApotek</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    /* RESET & DASAR UTAMA - Sesuai Standar Layout Sistem Anda */
    html, body {
      max-width: 100%;
      overflow-x: hidden;
      background-color: #e0f7fa; /* Warna Background Ghibli Cyan */
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }
    
    /* Font Ukuran Global Konstan 12px-13px */
    body, p, a, div, h1, h2, h3, h4, h5, h6, table, th, td, button, select, input {
      font-size: 13px !important;
    }

    /* SIDEBAR KIRI - Lebar Tetap Presisi Sesuai Gambar */
    .sidebar { 
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 200px; 
      height: 100vh; 
      background-color: #cca8e9; /* Warna Ungu Khas */
      padding: 20px 10px; 
      z-index: 1000; 
    }
    
    .sidebar-logo {
      font-weight: bold;
      font-size: 15px !important;
      padding: 5px 15px;
      margin-bottom: 25px;
      color: #333;
    }

    .sidebar a { 
      display: block; 
      padding: 10px 15px; 
      text-decoration: none; 
      color: #333; 
      font-weight: 500; 
    }
    
    .sidebar a:hover, .sidebar a.active { 
      background: rgba(255, 255, 255, 0.4); 
      border-radius: 5px; 
    }

    /* AREA KONTEN SEBELAH KANAN SIDEBAR */
    .main-content-wrapper { 
      margin-left: 200px; 
      padding: 40px; 
      min-height: 100vh;
    }

    /* KOTAK PUTIH UTAMA (Container Melayang Lebar) */
    .container-box {
      background: #ffffff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.03);
    }

    /* GAYA BARIS ITEM DETAIL BELANJA */
    .cart-item-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 0;
      border-bottom: 1px solid #eee;
    }

    .item-name {
      font-weight: bold;
      font-size: 14px !important;
    }

    /* Kontrol Jumlah (+ / -) */
    .quantity-control button {
      background-color: #f8f9fa;
      border: 1px solid #ccc;
      padding: 2px 10px;
      font-weight: bold;
      cursor: pointer;
      border-radius: 4px;
    }
    .quantity-control #jumlah {
      display: inline-block;
      width: 30px;
      text-align: center;
      font-weight: bold;
    }

    .total-price-box {
      font-size: 14px !important;
      font-weight: bold;
    }

    /* TOMBOL AKSI */
    .btn-bayar-biru {
      background-color: #0d6efd;
      color: white !important;
      font-weight: bold;
      border: none;
      padding: 8px 24px;
      border-radius: 6px;
      text-decoration: none;
      display: inline-block;
    }
    .btn-bayar-biru:hover {
      background-color: #0b5ed7;
    }

    .btn-kembali-putih {
      background-color: #ffffff;
      color: #333;
      border: 1px solid #ccc;
      font-weight: 500;
      padding: 8px 24px;
      border-radius: 6px;
      text-decoration: none;
      display: inline-block;
    }
    .btn-kembali-putih:hover {
      background-color: #f8f9fa;
    }
  </style>
</head>
<body>

  <!-- SIDEBAR UTAMA -->
  <nav class="sidebar">
    <div class="sidebar-logo">💊 GoApotek</div>
    <a href="index.html">🏠 Dashboard</a>
    <a href="#subMenuData" data-bs-toggle="collapse" class="d-flex justify-content-between align-items-center" aria-expanded="true">
      <span>📁 Data</span><i class="bi bi-chevron-down"></i>
    </a>
    <div class="collapse show" id="subMenuData" style="padding-left: 15px; background: rgba(0,0,0,0.05); border-radius: 4px;">
      <a href="dataobat.html">💊 Data Obat</a>
      <a href="dokterpraktek.html">🩺 Dokter Praktek</a>
      <a href="riwayatkunjungan.html">📋 Rekam Medis</a>
      <a href="Penjualan.html" class="active">🛒 Penjualan</a>
      <a href="user.html">🧑‍🧒‍🧒 User</a>
    </div>
    <a href="laporan.html">📈 Laporan</a>
    <a href="logout.html">🚪 Logout</a>
  </nav>

  <!-- KONTEN AREA UTAMA SEBELAH KANAN SIDEBAR -->
  <main class="main-content-wrapper">
    <div class="container-fluid p-0">
      
      <h4 class="fw-bold mb-4" style="font-size: 18px !important;">Keranjang Belanja</h4>

      <div class="container-box">
        
        <!-- Detail Barang Di Dalam Keranjang -->
        <div class="cart-item-row">
          <div>
            <div class="item-name">Paracetamol</div>
            <div class="item-price text-muted mt-1">Rp 10.000</div>
          </div>
          
          <!-- Pengatur Jumlah -->
          <div class="quantity-control">
            <button onclick="ubahJumlah(-1)">−</button>
            <span id="jumlah">1</span>
            <button onclick="ubahJumlah(1)">+</button>
          </div>

          <!-- Subtotal Nilai -->
          <div class="total-price-box">
            Total: <span class="text-danger" id="totalDisplay">Rp 10.000</span>
          </div>
        </div>

        <!-- Tombol Pilihan Aksi Di Bagian Bawah -->
        <div class="d-flex gap-2 mt-4">
          <a class="btn-bayar-biru" href="pembayaran.html">💳 Bayar</a>
          <a class="btn-kembali-putih" href="Penjualan.html">Kembali</a>
        </div>

      </div>
    </div>
  </main>

  <!-- LOGIKA MATEMATIS SINKRONISASI JUMLAH -->
  <script>
    let jumlah = 1;
    const harga = 10000;

    function ubahJumlah(nilai) {
      jumlah += nilai;
      if (jumlah < 1) jumlah = 1;
      
      document.getElementById('jumlah').innerText = jumlah;
      
      let totalHitung = jumlah * harga;
      document.getElementById('totalDisplay').innerText = "Rp " + totalHitung.toLocaleString('id-ID');
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
