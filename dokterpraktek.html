<!DOCTYPE html>
<html lang="id">
<head>

    .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,0.4); border-radius: 5px; }
    
    /* Layout Utama */
    .main-wrapper { margin-left: 200px; padding: 20px; }
    .container { max-width: 1140px; }
    
    /* Card Dokter */
    .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s; }
    .card:hover { transform: translateY(-5px); box-shadow: 0 8px 12px rgba(0,0,0,0.15); }
    .card-img-top { height: 200px; object-fit: cover; }
  </style>

            <img src="aset/dokter2.jpg" class="card-img-top" alt="dr. Arini">
