<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Obat Expired - GoApotek</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"/>
  
  <style>
    /* Dasar */
    body { background-color: #e0f7fa; font-size: 13px; margin: 0; }
    
    /* Sidebar */
    .sidebar { position: fixed; top: 0; left: 0; width: 200px; height: 100vh; background-color: #cca8e9; padding: 20px 10px; z-index: 1000; }
    .sidebar a { display: block; padding: 10px 15px; text-decoration: none; color: #333; font-weight: 500; }
    .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,0.4); border-radius: 5px; }
    
    /* Layout Utama */
    .main-wrapper { margin-left: 200px; padding: 20px; }
    .container { max-width: 1140px; }
    
    /* Tabel */
    .table-container { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-logo mb-4 fw-bold p-2">💊 GoApotek</div>
    <a href="index.html">🏠 Beranda</a>
    
    <a href="#subMenuData" data-bs-toggle="collapse" class="d-flex justify-content-between align-items-center">
          <span>📁 Data</span>
          <i class="bi bi-chevron-down" style="font-size: 0.8rem;"></i>
        </a>
        
        <div class="collapse show" id="subMenuData" style="padding-left: 15px; background: rgba(0,0,0,0.05); border-radius: 4px;">
          <a href="dataobat.html" class="active">💊 Data Obat</a>
          <a href="dokterpraktek.html">🩺 Dokter Praktek</a>
          <a href="rekammedis.html">📋 Rekam Medis</a>
          <a href="Penjualan.html">🛒 Penjualan</a>
          <a href="user.html">🧑‍🧒‍🧒 User</a>
        </div>
  
        <a href="laporan.html">📈 Laporan</a>
        <a href="logout.html">🚪 Logout</a>
      </nav>

  <!-- Konten -->
  <main class="main-wrapper">
    <div class="container">
      <h2 class="fw-bold mb-4">📅 Obat Expired</h2>
      
      <!-- Navbar Search -->
      <nav class="navbar bg-white rounded p-3 mb-3 shadow-sm">
        <div class="container-fluid">
          <form class="d-flex" role="search" onsubmit="return false;">
            <input class="form-control me-2" type="search" id="searchInput" placeholder="Cari obat expired...">
          </form>
          <a href="dataobat.html" class="btn btn-outline-primary">Kembali</a>
        </div>
      </nav>

      <!-- Tabel -->
      <div class="table-container">
        <table class="table table-hover align-middle" id="obatTable">
          <thead class="table-danger">
            <tr>
              <th>No</th>
              <th>Nama Obat</th>
              <th>Bentuk</th>
              <th>Jenis Obat</th>
              <th>Stok</th>
              <th>Tanggal Expired</th>
            </tr>
          </thead>
          <tbody>
            <tr><td>1</td><td>Asam Mefenamat</td><td>Tablet</td><td>Obat Khusus</td><td>50</td><td>2025-05-30</td></tr>
            <tr><td>2</td><td>Tetrasiklin</td><td>Tablet</td><td>Obat Khusus</td><td>20</td><td>2025-06-10</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById("searchInput").addEventListener("keyup", function () {
      const input = this.value.toLowerCase();
      document.querySelectorAll("#obatTable tbody tr").forEach(row => {
        row.style.display = row.innerText.toLowerCase().includes(input) ? "" : "none";
      });
    });
  </script>
</body>
</html>
