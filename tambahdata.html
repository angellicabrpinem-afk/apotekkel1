    /* Card Form */

    label { font-weight: 600; margin-bottom: 5px; }
  </style>

<body>

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-logo mb-4 fw-bold p-2">💊 GoApotek</div>
    <a href="index.html">🏠 Beranda</a>
    
    <a href="#subMenuData" data-bs-toggle="collapse" class="d-flex justify-content-between align-items-center">
          <span>📁 Data</span>
          <i class="bi bi-chevron-down" style="font-size: 0.8rem;"></i>

        <div class="collapse show" id="subMenuData" style="padding-left: 15px; background: rgba(0,0,0,0.05); border-radius: 4px;">

          <a href="rekammedis.html">📋 Rekam Medis</a>

        </div>
  
        <a href="laporan.html">📈 Laporan</a>
        <a href="logout.html">🚪 Logout</a>
      </nav>

  <!-- Konten -->
  <main class="main-wrapper">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">Tambah Data Obat</h2>
        <a href="dataobat.html" class="btn btn-outline-secondary">🔙 Kembali</a>
      </div>
      
      <div class="card p-4">
        <form action="simpan_obat.php" method="POST" enctype="multipart/form-data">
          <div class="row g-3">
            <div class="col-md-6">
              <label>Nama Obat*</label>
              <input name="nama_obat" type="text" class="form-control" required>
            </div>
            <div class="col-md-6">
              <label>Golongan*</label>
              <input name="golongan" type="text" class="form-control" required>
            </div>
            <div class="col-12">
              <label>Manfaat</label>
              <input name="manfaat" type="text" class="form-control">
            </div>
            <div class="col-md-6">
              <label>Dosis Pemakaian</label>
              <input name="dosis" type="text" class="form-control">
            </div>
            <div class="col-md-6">
              <label>Stok</label>
              <input name="stok" type="number" class="form-control" min="0">
            </div>
            <div class="col-md-6">
              <label>Harga Beli (Rp)*</label>
              <div class="input-group">
                <span class="input-group-text">Rp</span>
                <input name="harga_beli" type="number" class="form-control" required>
              </div>
            </div>
            <div class="col-md-6">
              <label>Harga Jual (Rp)*</label>
              <div class="input-group">
                <span class="input-group-text">Rp</span>
                <input name="harga_jual" type="number" class="form-control" required>
              </div>
            </div>
            <div class="col-12">
              <label>Keterangan Lain</label>
              <textarea name="keterangan" class="form-control" rows="3"></textarea>
            </div>
          </div>
          <button type="submit" class="btn btn-success mt-4">Simpan Data</button>
        </form>
      </div>
    </div>
  </main>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
