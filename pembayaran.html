<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Metode Pembayaran - GoApotek</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    /* RESET & DASAR UTAMA - Konsisten dengan Sistem Anda */
    html, body {
      max-width: 100%;
      overflow-x: hidden;
      background-color: #e0f7fa; /* Warna Background Cyan */
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }
    
    /* Font Ukuran Global Konstan 12px-13px */
    body, p, a, div, h1, h2, h3, h4, h5, h6, table, th, td, button, select, input, label {
      font-size: 13px !important;
    }

    /* SIDEBAR KIRI - Lebar Tetap Presisi Sesuai Gambar */
    .sidebar { 
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 200px; 
      height: 100vh; 
      background-color: #cca8e9; /* Warna Ungu Khas */
      padding: 20px 10px; 
      z-index: 1000; 
    }
    
    .sidebar-logo {
      font-weight: bold;
      font-size: 15px !important;
      padding: 5px 15px;
      margin-bottom: 25px;
      color: #333;
    }

    .sidebar a { 
      display: block; 
      padding: 10px 15px; 
      text-decoration: none; 
      color: #333; 
      font-weight: 500; 
    }
    
    .sidebar a:hover, .sidebar a.active { 
      background: rgba(255, 255, 255, 0.4); 
      border-radius: 5px; 
    }

    /* AREA KONTEN SEBELAH KANAN SIDEBAR */
    .main-content-wrapper { 
      margin-left: 200px; 
      padding: 40px; 
      min-height: 100vh;
    }

    /* KOTAK PUTIH UTAMA (Container Melayang Lebar) */
    .container-box {
      background: #ffffff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.03);
    }

    /* GAYA PILIHAN METODE PEMBAYARAN */
    .payment-option {
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
      background-color: #f8fafd;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .payment-option input[type="radio"] {
      margin-top: 3px;
      transform: scale(1.1);
    }

    .payment-option label {
      font-weight: bold;
      cursor: pointer;
      display: block;
      margin-bottom: 4px;
    }

    .payment-details p {
      margin: 0;
      color: #666;
    }

    /* TOMBOL AKSI */
    .btn-bayar-biru {
      background-color: #0d6efd;
      color: white !important;
      font-weight: bold;
      border: none;
      padding: 10px 24px;
      border-radius: 6px;
      text-decoration: none;
      display: inline-block;
    }
    .btn-bayar-biru:hover {
      background-color: #0b5ed7;
    }
  </style>
</head>
<body>

  <!-- SIDEBAR UTAMA -->
  <nav class="sidebar">
    <div class="sidebar-logo">💊 GoApotek</div>
    <a href="index.html">🏠 Dashboard</a>
    <a href="#subMenuData" data-bs-toggle="collapse" class="d-flex justify-content-between align-items-center" aria-expanded="true">
      <span>📁 Data</span><i class="bi bi-chevron-down"></i>
    </a>
    <div class="collapse show" id="subMenuData" style="padding-left: 15px; background: rgba(0,0,0,0.05); border-radius: 4px;">
      <a href="dataobat.html">💊 Data Obat</a>
      <a href="dokterpraktek.html">🩺 Dokter Praktek</a>
      <a href="riwayatkunjungan.html">📋 Rekam Medis</a>
      <a href="Penjualan.html" class="active">🛒 Penjualan</a>
      <a href="user.html">🧑‍🧒‍🧒 User</a>
    </div>
    <a href="laporan.html">📈 Laporan</a>
    <a href="logout.html">🚪 Logout</a>
  </nav>

  <!-- KONTEN AREA UTAMA SEBELAH KANAN SIDEBAR -->
  <main class="main-content-wrapper">
    <div class="container-fluid p-0">
      
      <h4 class="fw-bold mb-4" style="font-size: 18px !important;">Metode Pembayaran</h4>

      <div class="container-box" id="paymentBox">
        
        <!-- Pilihan 1: Kartu Kredit -->
        <div class="payment-option">
          <input type="radio" id="creditCard" name="paymentMethod" value="Kartu Kredit" checked>
          <div>
            <label for="creditCard">Kartu Kredit / Debit</label>
            <div class="payment-details">
              <p>Visa, Mastercard, GPN, dll.</p>
            </div>
          </div>
        </div>

        <!-- Pilihan 2: Transfer Bank -->
        <div class="payment-option">
          <input type="radio" id="bankTransfer" name="paymentMethod" value="Transfer Bank">
          <div>
            <label for="bankTransfer">Transfer Bank</label>
            <div class="payment-details">
              <p>Mandiri, BCA, BRI, BNI</p>
            </div>
          </div>
        </div>

        <!-- Pilihan 3: Dompet Digital -->
        <div class="payment-option">
          <input type="radio" id="digitalWallet" name="paymentMethod" value="Dompet Digital">
          <div>
            <label for="digitalWallet">Dompet Digital</label>
            <div class="payment-details">
              <p>GoPay, OVO, Dana, LinkAja</p>
            </div>
          </div>
        </div>

        <!-- Tombol Aksi Pembayaran -->
        <div class="mt-4">
          <a id="linkPembayaran" class="btn-bayar-biru" href="Prosespembayaran.html">
            <i class="bi bi-shield-check"></i> Bayar Sekarang
          </a>
        </div>

      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
