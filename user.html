<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User - GoApotek</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  
  <style>
  /* 1. Pengaturan Dasar (Paten 12px) */
  * { box-sizing: border-box; }
  body { 
    margin: 0; padding: 0; 
    background-color: #e0f7fa; 
    font-size: 12px !important; 
    min-height: 100vh; 
  }

  /* 2. SIDEBAR (HARGA MATI 200px) */
  .sidebar { 
    position: fixed; top: 0; left: 0; 
    width: 200px; min-width: 200px; max-width: 200px; 
    height: 100vh; 
    background-color: #cca8e9; 
    padding: 20px 10px; 
    z-index: 1000; 
  }
  .sidebar-logo { font-weight: bold; padding: 10px; margin-bottom: 20px; font-size: 12px !important; }
  .sidebar a { 
    display: block; padding: 10px 15px; 
    text-decoration: none; color: #333; font-weight: 500; 
    font-size: 12px !important; 
  }
  .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,0.4); border-radius: 5px; }

  /* 3. LAYOUT UTAMA (Wajib margin-left: 200px agar tidak tertutup sidebar) */
  .main-wrapper { margin-left: 200px; padding: 20px; }
  .container { max-width: 1140px; }

  /* 4. JUDUL & TEKS (Paten 12px) */
  h2, h3, h4, h6, p, span { font-size: 12px !important; }

  /* 5. KOMPONEN KARTU (Untuk Index & User) */
  /* Card Stat (Index) */
  .card-stat { padding: 20px; border-radius: 10px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
  
  /* Card User (User.html) */
  .card-container { display: flex; flex-wrap: wrap; gap: 20px; }
  .card { width: 220px !important; border: none; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
  .card-img-top { height: 180px; object-fit: cover; }
</style>
</head>
<body>

  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-logo mb-4 fw-bold p-2">💊 GoApotek</div>
    <a href="index.html">🏠 Beranda</a>
    
    <a href="#subMenuData" data-bs-toggle="collapse" class="d-flex justify-content-between align-items-center">
          <span>📁 Data</span>
          <i class="bi bi-chevron-down" style="font-size: 0.8rem;"></i>
        </a>
        
        <div class="collapse show" id="subMenuData" style="padding-left: 15px; background: rgba(0,0,0,0.05); border-radius: 4px;">
          <a href="dataobat.html">💊 Data Obat</a>
          <a href="dokterpraktek.html">🩺 Dokter Praktek</a>
          <a href="rekammedis.html">📋 Rekam Medis</a>
          <a href="Penjualan.html">🛒 Penjualan</a>
          <a href="user.html" class="active">🧑‍🧒‍🧒 User</a>
        </div>
  
        <a href="laporan.html">📈 Laporan</a>
        <a href="logout.html">🚪 Logout</a>
      </nav>

  <main class="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="fw-bold m-0">User</h2>
      <a href="tambahuser.html" class="btn btn-primary btn-sm">+ Tambah User</a>
    </div>
    
    <div class="card-container">
      <div class="card">
        <img src="aset/Alisa.jpg" class="card-img-top" alt="Alisa">
        <div class="card-body">
          <h6 class="card-title">Alisa</h6>
          <p class="card-text"><strong>Admin</strong></p>
          <a href="detailuser1.html" class="btn btn-sm btn-success">Detail</a>
        </div>
      </div>
      <div class="card">
        <img src="aset/Anggota1.jpeg" class="card-img-top" alt="Anggota1">
        <div class="card-body">
          <h6 class="card-title">Angellica Br Pinem</h6>
          <p class="card-text"><strong>Operator 1</strong></p>
          <a href="detailuser2.html" class="btn btn-sm btn-success">Detail</a>
        </div>
      </div>
      <div class="card">
        <img src="aset/Anggota2.jpeg" class="card-img-top" alt="Anggota2">
        <div class="card-body">
          <h6 class="card-title">Mutiara Saskia</h6>
          <p class="card-text"><strong>Operator 2</strong></p>
          <a href="detailuser3.html" class="btn btn-sm btn-success">Detail</a>
        </div>
      </div>
    </div>
  </main>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
