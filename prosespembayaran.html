<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Proses Pembayaran • GoApotek</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    /* Reset & Latar Belakang Cyan Konsisten */
    html, body { 
      max-width: 100%; 
      overflow-x: hidden; 
      margin: 0;
      background-color: #e0f7fa;
      font-family: system-ui, -apple-system, sans-serif;
    }
    
    body, p, a, div, h1, h2, h3, h4, h5, h6, span, button, td, th { 
      font-size: 13px !important; 
    }
    
    /* SIDEBAR KIRI (Lebar 200px Ungu Khas) */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 200px;
      height: 100vh;
      background-color: #cca8e9;
      padding: 20px 10px;
      z-index: 1000;
    }
    
    .sidebar-logo {
      font-weight: bold;
      font-size: 15px !important;
      padding: 5px 15px;
      margin-bottom: 25px;
      color: #333;
    }

    .sidebar a {
      display: block;
      padding: 10px 15px;
      text-decoration: none;
      color: #333;
      font-weight: 500;
    }

    .sidebar a:hover, .sidebar a.active {
      background: rgba(255, 255, 255, 0.4);
      border-radius: 5px;
    }

    .submenu-box {
      padding-left: 15px;
      background: rgba(0, 0, 0, 0.05);
      border-radius: 4px;
    }

    /* AREA UTAMA DI SEBELAH KANAN SIDEBAR */
    .main-wrapper { 
      margin-left: 200px;
      padding: 40px; 
      min-height: 100vh;
    }
    
    /* Box Loading Melayang Tengah */
    #loadingBox {
      background: white;
      padding: 35px;
      border-radius: 12px;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.03);
    }

    #successBox { 
      display: none; 
    }
    
    /* KARTU NOTA / STRUK KASIR MINIMALIS */
    .invoice-box {
      border: 1px dashed #555;
      padding: 25px 20px;
      border-radius: 0px; /* Datar agar seperti kertas struk potong */
      background-color: #ffffff;
      max-width: 380px;
      text-align: left;
    }
    
    .line { border-top: 1px dashed #333; margin: 12px 0; }
    .flex-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .totals { text-align: right; font-weight: bold; margin-top: 10px; }

    /* Gaya Tombol Aksi */
    .btn-aksi-cetak {
      background-color: #0d6efd;
      color: white !important;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-weight: bold;
    }
    .btn-aksi-cetak:hover {
      background-color: #0b5ed7;
    }

    .btn-aksi-dashboard {
      background-color: #198754;
      color: white !important;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      font-weight: bold;
      text-decoration: none;
      display: inline-block;
    }
    .btn-aksi-dashboard:hover {
      background-color: #146c43;
    }

    @media print {
      .no-print { display: none !important; }
      .main-wrapper { margin-left: 0 !important; padding: 0 !important; }
      body { background-color: #fff !important; }
      .invoice-box { border: none !important; padding: 0 !important; max-width: 100% !important; }
    }
  </style>
</head>
<body>

<div class="container-fluid p-0">
  <div class="row g-0">
    
    <!-- SIDEBAR UTAMA -->
    <nav class="sidebar no-print">
      <div class="sidebar-logo">💊 GoApotek</div>
      <a href="index.html">🏠 Dashboard</a>
      <a href="#subMenuData" data-bs-toggle="collapse" class="d-flex justify-content-between align-items-center" aria-expanded="true">
        <span>📁 Data</span><i class="bi bi-chevron-down"></i>
      </a>
      <div class="collapse show submenu-box" id="subMenuData">
        <a href="dataobat.html">💊 Data Obat</a>
        <a href="dokterpraktek.html">🩺 Dokter Praktek</a>
        <a href="riwayatkunjungan.html">📋 Rekam Medis</a>
        <a href="Penjualan.html" class="active">🛒 Penjualan</a>
        <a href="user.html">🧑‍🧒‍🧒 User</a>
      </div>
      <a href="laporan.html">📈 Laporan</a>
      <a href="logout.html">🚪 Logout</a>
    </nav>

    <!-- AREA NOTA UTAMA (KANAN SIDEBAR) -->
    <main class="main-wrapper">
      
      <!-- Seksi Animasi Loading Awal -->
      <div id="loadingBox">
        <div class="spinner-border text-success mb-3" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <p class="m-0 fw-bold">Pembayaran Anda sedang diproses...</p>
      </div>

      <!-- Seksi Tampilan Sukses & Nota Struk Belanja -->
      <div id="successBox">
        <div class="no-print mb-3">
          <h5 class="text-success fw-bold mb-1">✅ Pembayaran Berhasil!</h5>
          <p class="text-muted">Transaksi telah selesai diproses dan disimpan ke sistem.</p>
        </div>
        
        <!-- Wadah Struk Kasir -->
        <div class="invoice-box" id="printArea"></div>

        <!-- Tombol Cetak dan Navigasi Kembali -->
        <div class="mt-4 no-print d-flex gap-2">
          <button class="btn-aksi-cetak" onclick="cetakStruk()"><i class="bi bi-printer"></i> Cetak Struk</button>
          <a href="index.html" class="btn-aksi-dashboard" onclick="bersihkanKeranjang()">Kembali ke Dashboard</a>
        </div>
      </div>

    </main>

  </div>
</div>

<script>
  // Mengambil data dari keranjang belanja LocalStorage
  let keranjang = JSON.parse(localStorage.getItem("keranjang")) || [
    { nama: "Paracetamol 500mg", harga: 10000, jumlah: 1 }
  ];

  function buatStruk() {
    const printArea = document.getElementById("printArea");
    if (!printArea) return;

    let total = 0;
    let itemHTML = "";

    keranjang.forEach(item => {
      let subtotal = item.harga * item.jumlah;
      total += subtotal;
      itemHTML += `
        <div class="flex-row">
          <span>${item.nama} (${item.jumlah}x)</span>
          <span>Rp ${subtotal.toLocaleString('id-ID')}</span>
        </div>
      `;
    });

    let waktuSekarang = new Date().toLocaleString('id-ID', { dateStyle: 'short', timeStyle: 'short' });
    let infoTunai = total; // Pembayaran pas sesuai tagihan
    let infoKembalian = 0;

    printArea.innerHTML = `
      <div style="text-align:center; font-weight:bold; font-size:15px !important; margin-bottom:2px;">GoApotek</div>
      <div style="text-align:center; color:#6c757d;" class="mb-3">Struk Pembayaran Resmi</div>
      
      <div class="flex-row"><span>No. Struk</span><span>#INV-${Date.now().toString().slice(-6)}</span></div>
      <div class="flex-row"><span>Tanggal</span><span>${waktuSekarang}</span></div>
      <div class="flex-row"><span>Kasir</span><span>Admin</span></div>
      
      <div class="line"></div>
      <div class="item-list">${itemHTML}</div>
      <div class="line"></div>
      
      <div class="totals">
        <div class="flex-row fw-bold"><span>Total Tagihan :</span><span>Rp ${total.toLocaleString('id-ID')}</span></div>
        <div class="flex-row"><span>Bayar Tunai  :</span><span>Rp ${infoTunai.toLocaleString('id-ID')}</span></div>
        <div class="flex-row text-success fw-bold"><span>Kembalian    :</span><span>Rp ${infoKembalian.toLocaleString('id-ID')}</span></div>
      </div>
      
      <div class="line"></div>
      <div style="text-align:center; margin-top: 15px; color:#6c757d;">
        <div class="fw-bold">--- Terima Kasih ---</div>
        <div style="font-size: 11px !important;">Semoga lekas sembuh 🙏</div>
      </div>
    `;
  }

  // Generate isi struk saat dokumen dimuat
  document.addEventListener("DOMContentLoaded", buatStruk);

  // Efek transisi otomatis dari loading ke cetak struk
  setTimeout(function() {
    document.getElementById('loadingBox').style.display = 'none';
    document.getElementById('successBox').style.display = 'block';
  }, 1200);

  // Logika cetak struk bawaan browser
  function cetakStruk() {
    window.print();
  }

  function bersihkanKeranjang() {
    localStorage.removeItem("keranjang");
  }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
